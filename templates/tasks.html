<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks List</title>
    <style>
        /* Dark Theme Styling */
        body, html {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
        }

        .container {
            text-align: center;
            width: 80%;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            background-color: #1e1e1e;
        }

        input[type="text"] {
            padding: 8px;
            margin: 5px 0;
            width: calc(100% - 20px);
            border-radius: 4px;
            border: 1px solid #333;
            background-color: #333;
            color: #e0e0e0;
        }

        button {
            padding: 8px 16px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
        }

        button:hover {
            background-color: #0056b3;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
            text-align: left;
        }

        li {
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        li strong {
            margin-right: 10px;
        }

        .warning {
            color: #ff6b6b;
            font-size: 0.9em;
            margin-top: 5px;
        }
    </style>
    <script>
        async function listTasks() {
            const response = await fetch('/tasks');
            const tasks = await response.json();
            const taskList = document.getElementById('task-list');
            taskList.innerHTML = '';
            tasks.forEach(task => {
                const listItem = document.createElement('li');
                listItem.innerHTML = `<span><strong>${task.title}</strong>: ${task.description}</span>
                                      <div>
                                          <button onclick="editTask(${task.id}, '${task.title}', '${task.description}')">Edit</button>
                                          <button onclick="deleteTask(${task.id})">Delete</button>
                                      </div>`;
                taskList.appendChild(listItem);
            });
        }

        async function addTask() {
            const title = document.getElementById('task-title').value.trim();
            const description = document.getElementById('task-desc').value.trim();
            const warning = document.getElementById('warning-message');

            if (title === "" || description === "") {
                warning.textContent = "Please fill out both the title and description.";
                return;
            }

            warning.textContent = "";
            await fetch('/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description })
            });
            document.getElementById('task-title').value = '';
            document.getElementById('task-desc').value = '';
            listTasks();
        }

        function editTask(id, title, description) {
            document.getElementById('task-id').value = id;
            document.getElementById('task-title').value = title;
            document.getElementById('task-desc').value = description;
            document.getElementById('update-task').style.display = 'inline';
            document.getElementById('add-task').style.display = 'none';
        }

        async function updateTask() {
            const id = document.getElementById('task-id').value;
            const title = document.getElementById('task-title').value;
            const description = document.getElementById('task-desc').value;
            await fetch(`/tasks/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description })
            });
            document.getElementById('task-id').value = '';
            document.getElementById('task-title').value = '';
            document.getElementById('task-desc').value = '';
            document.getElementById('update-task').style.display = 'none';
            document.getElementById('add-task').style.display = 'inline';
            listTasks();
        }

        async function deleteTask(id) {
            await fetch(`/tasks/${id}`, { method: 'DELETE' });
            listTasks();
        }

        window.onload = listTasks;
    </script>
</head>
<body>
    <div class="container">
        <h1>Tasks List</h1>
        <input type="hidden" id="task-id">
        <input type="text" id="task-title" placeholder="Enter task title">
        <input type="text" id="task-desc" placeholder="Enter task description">
        <button id="add-task" onclick="addTask()">Add Task</button>
        <button id="update-task" onclick="updateTask()" style="display:none;">Update Task</button>
        <div id="warning-message" class="warning"></div>
        <ul id="task-list"></ul>
    </div>
</body>
</html>
